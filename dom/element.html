<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Second Video</title>
  </head>
  <body style="background-color: #212121; color: white">
    <div class="parent">
      <div class="day">Monday</div>
      <div class="day">Tuesday</div>
      <div class="day">Wednesday</div>
      <div class="day">Thursday</div>
      <div class="day">Friday</div>
      <div class="day">Saturday</div>
      <div class="day">Sunday</div>
    </div>
  </body>
  <script>
    const parent = document.querySelector(".parent");
    console.log(parent);
    console.log(parent.children);
    console.log(parent.children[1]);
    console.log(parent.children[1].innerHTML);
    for(let i=0;i<parent.children.length;i++){
        console.log(parent.children[i].innerHTML)
    }
    parent.children[0].style.color="red"
    parent.children[1].style.color="orange"
    parent.children[2].style.color="yellow"
    parent.children[3].style.color="lime"
    parent.children[4].style.color="green"
    parent.children[5].style.color="cyan"
    parent.children[6].style.color="blue"
    console.log(parent.firstElementChild)
    console.log(parent.lastElementChild)
    const dayOne = document.querySelector(".day")
    console.log(dayOne.parentElement)
    console.log(dayOne.nextElementSibling)
    console.log("NODES : ",parent.childNodes)
    const divElement = document.createElement('div')
    console.log(divElement)
    divElement.className="main"
    divElement.id=Math.round(Math.random()*10)
    divElement.setAttribute("title","generated Title")
    divElement.style.backgroundColor="red"
    divElement.style.color="yellow"
    divElement.style.padding="15px"
    divElement.innerText="HELLO WORLD !"
    document.body.appendChild(divElement)
  </script>
</html>
